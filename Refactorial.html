
 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Color Portfolio</title>

<style>

html{
scroll-behavior:smooth;
}

/* 🎨 Color Variables */
:root{
--primary:#6c63ff;
--secondary:#00c9a7;
--pink:#ff6a88;
--orange:#ff9a44;
--bg:#f5f7fa;
--text:#222;
}

/* Body */
body{
font-family:Arial;
margin:0;
background:var(--bg);
color:var(--text);
transition:0.3s;
}

/* 🌙 Dark Mode */
.dark{
--bg:#121212;
--text:#fff;
}

/* Navbar */
nav{
background:linear-gradient(45deg,var(--primary),var(--secondary));
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav a{
color:white;
margin-right:20px;
text-decoration:none;
font-weight:bold;
}

button{
padding:8px 15px;
border:none;
border-radius:20px;
background:white;
color:var(--primary);
cursor:pointer;
}

/* Sections */
section{
padding:80px;
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
color:white;
}

/* 🌈 Different Colors for Each Section */

/* Home */
#home{
background:linear-gradient(120deg,#6c63ff,#00c9a7);
}

/* About */
#about{
background:linear-gradient(120deg,#ff6a88,#ff9a44);
}

/* Contact */
#contact{
background:linear-gradient(120deg,#43cea2,#185a9d);
}

/* Form */
form{
max-width:400px;
width:100%;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
color:black;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

input:focus{
outline:none;
border-color:var(--primary);
box-shadow:0 0 5px var(--primary);
}

.error{
color:red;
font-size:13px;
}

form button{
background:var(--primary);
color:white;
width:100%;
}

form button:hover{
background:var(--secondary);
}

/* Responsive */
@media(max-width:768px){
section{
padding:40px;
}

nav{
flex-direction:column;
gap:10px;
}
}

</style>
</head>

<body>

<nav>
<div>
<a href="#home">Home</a>
<a href="#about">About</a>
<a href="#contact">Contact</a>
</div>

<button onclick="toggleDark()">🌙</button>
</nav>

<section id="home">
<h1>Home Section</h1>
<p>Beautiful gradient colors 😍</p>
</section>

<section id="about">
<h1>About Section</h1>
<p>Every section now has its own color 🎨</p>
</section>

<section id="contact">

<h1>Contact Form</h1>

<form onsubmit="return validateForm()">

<input type="text" id="name" placeholder="Enter Name">
<div id="nameError" class="error"></div>

<input type="email" id="email" placeholder="Enter Email">
<div id="emailError" class="error"></div>

<input type="password" id="password" placeholder="Enter Password">
<div id="passError" class="error"></div>

<button type="submit">Submit</button>

</form>

</section>

<script>

/* 🌙 Dark Mode */
function toggleDark(){
document.body.classList.toggle("dark")

let mode=document.body.classList.contains("dark")?"dark":"light"
localStorage.setItem("theme",mode)
}

window.onload=function(){
if(localStorage.getItem("theme")==="dark"){
document.body.classList.add("dark")
}
}

/* 📩 Form Validation */
function validateForm(){

let name=document.getElementById("name").value.trim()
let email=document.getElementById("email").value.trim()
let password=document.getElementById("password").value.trim()

let valid=true

document.getElementById("nameError").innerHTML=""
document.getElementById("emailError").innerHTML=""
document.getElementById("passError").innerHTML=""

if(name===""){
document.getElementById("nameError").innerHTML="Name required"
valid=false
}

if(email===""){
document.getElementById("emailError").innerHTML="Email required"
valid=false
}else if(!email.includes("@")){
document.getElementById("emailError").innerHTML="Invalid email"
valid=false
}

if(password.length<6){
document.getElementById("passError").innerHTML="Min 6 characters"
valid=false
}

if(valid){
alert("✅ Form Submitted!")
}

return valid
}

</script>

</body>
</html>
